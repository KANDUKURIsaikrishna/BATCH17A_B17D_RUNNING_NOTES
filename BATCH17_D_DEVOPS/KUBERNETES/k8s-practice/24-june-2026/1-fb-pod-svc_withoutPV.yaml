---
apiVersion: v1
kind: Pod
metadata:
  name: fb-pod
  labels:
    app: facebook
spec:
  containers:
    - name: fb-container
      image: devopshubg333/batch17d:httpd
      ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: fb-svc
  labels:
    app: facebook
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  selector:
    app: facebook