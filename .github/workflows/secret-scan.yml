name: Secret Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for hardcoded placeholders replaced incorrectly
        run: |
          echo "Checking for real AWS account IDs..."
          # AWS Access Key IDs
          if grep -rE "(AKIA|ASIA|AROA|AIDA|ANPA|ANVA|AIPA)[A-Z0-9]{16}" . --include="*" --exclude-dir=".git"; then
            echo "ERROR: Real AWS Access Key found!" && exit 1
          fi
          # SonarQube tokens (squ_ prefix = real token)
          if grep -rE "squ_[a-f0-9]{40}" . --include="*" --exclude-dir=".git"; then
            echo "ERROR: Real SonarQube token found!" && exit 1
          fi
          # AWS Account IDs (12-digit number in ARN context)
          if grep -rE "arn:aws:[a-z]+:[a-z0-9-]*:[0-9]{12}:" . --include="*" --exclude-dir=".git"; then
            echo "ERROR: Real AWS ARN with account ID found!" && exit 1
          fi
          # EFS filesystem IDs
          if grep -rE "fs-[a-f0-9]{17}" . --include="*" --exclude-dir=".git"; then
            echo "ERROR: Real EFS filesystem ID found!" && exit 1
          fi
          # AWS console signin URLs with real account IDs
          if grep -rE "[0-9]{12}\.signin\.aws\.amazon\.com" . --include="*" --exclude-dir=".git"; then
            echo "ERROR: Real AWS account ID in signin URL found!" && exit 1
          fi
          echo "No real secrets detected."
